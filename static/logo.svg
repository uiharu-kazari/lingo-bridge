<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Purple Gradient (Source) -->
    <linearGradient id="purpleGrad" x1="6" y1="6" x2="16" y2="19" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    
    <!-- Cyan Gradient (Target) -->
    <linearGradient id="cyanGrad" x1="20" y1="14" x2="30" y2="27" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1fe0d0" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    
    <!-- Hybrid Bridge Gradient -->
    <linearGradient id="bridgeGrad" x1="11" y1="10" x2="25" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#1fe0d0" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Card 1 (Back, Source Language, Purple Translucent) -->
  <path d="M 6 11 L 16 6 L 16 14 L 6 19 Z" 
        fill="url(#purpleGrad)" 
        fill-opacity="0.25" 
        stroke="url(#purpleGrad)" 
        stroke-width="1.2" 
        stroke-linejoin="round" />

  <!-- Card 2 (Middle, Hybrid Translucent) -->
  <path d="M 13 15 L 23 10 L 23 18 L 13 23 Z" 
        fill="url(#bridgeGrad)" 
        fill-opacity="0.18" 
        stroke="url(#bridgeGrad)" 
        stroke-width="1.2" 
        stroke-linejoin="round" 
        stroke-dasharray="2 1.5" />

  <!-- Card 3 (Front, Target Language, Cyan Translucent) -->
  <path d="M 20 19 L 30 14 L 30 22 L 20 27 Z" 
        fill="url(#cyanGrad)" 
        fill-opacity="0.25" 
        stroke="url(#cyanGrad)" 
        stroke-width="1.2" 
        stroke-linejoin="round" />

  <!-- Connecting Bridge Ribbon (Graceful Arc) -->
  <path d="M 11 12 C 14 2, 22 8, 25 20" 
        stroke="url(#bridgeGrad)" 
        stroke-width="2.2" 
        stroke-linecap="round" 
        filter="url(#glow)" />
</svg>
